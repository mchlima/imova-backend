# Nginx reverse proxy para a API do Meu Revelar (nível host).
# A Cloudflare (Full strict) termina o TLS público e faz proxy para este servidor.
# Colocar em /etc/nginx/sites-available/ e symlinkar em sites-enabled/.

upstream imova_api {
    server 127.0.0.1:3334;
    keepalive 32;
}

server {
    listen 80;
    server_name api.meurevelar.com.br;

    client_max_body_size 10m; # uploads de capa (CMS)

    location / {
        proxy_pass http://imova_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
